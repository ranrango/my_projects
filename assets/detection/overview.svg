<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="轻量 YOLOv8 检测">
  <style>
    .bg { fill: #f7f9fb; }
    .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
    .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526173; }
    .item { font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #243447; }
    .itemRow { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .accent { fill: #2f80ed; }
    .accentFill { fill: #2f80ed; }
  </style>
  <rect class="bg" width="960" height="420" rx="0"/>
  <rect class="panel" x="28" y="28" width="904" height="364" rx="8"/>
  <rect class="accent" x="28" y="28" width="10" height="364" rx="5"/>
  <text x="72" y="76" class="title">轻量 YOLOv8 检测</text>
  <text x="72" y="110" class="subtitle">YOLOv8n ONNX + OpenCV DNN，面向边缘 CPU 推理</text>
  <rect class="itemRow" x="72" y="142" width="816" height="52" rx="8"/>
  <circle class="accentFill" cx="98" cy="168" r="5"/>
  <text x="120" y="175" class="item">支持 person / car / bus / truck</text>
  <rect class="itemRow" x="72" y="206" width="816" height="52" rx="8"/>
  <circle class="accentFill" cx="98" cy="232" r="5"/>
  <text x="120" y="239" class="item">视频、摄像头、无头批处理入口</text>
  <rect class="itemRow" x="72" y="270" width="816" height="52" rx="8"/>
  <circle class="accentFill" cx="98" cy="296" r="5"/>
  <text x="120" y="303" class="item">本地样例验证：640x360 视频可跑通</text>

</svg>
